name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 安装 Linux 窗口运行依赖
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo sed -i 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list \
            /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y \
            libfontconfig1 libwayland-client0 libxkbcommon0 libxkbcommon-x11-0 \
            libx11-6 xvfb
      - name: 检出言序 1.1.9 工具链
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu
          path: target/yanxu-core
          ref: v1.1.9
      - name: 构建言序 1.1.9
        run: cargo build --manifest-path target/yanxu-core/Cargo.toml --locked --bin yanxu
      - name: 检出言序 1.1.20 发布工具链
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu
          path: target/yanxu-release
          ref: v1.1.20
      - name: 构建言序 1.1.20 发布工具链
        run: cargo build --manifest-path target/yanxu-release/Cargo.toml --locked --bin yanxu
      - name: 核对原生架构
        shell: bash
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: |
          test "$(rustc -vV | sed -n 's/^host: //p')" = "$EXPECTED_TARGET"
      - name: 解析精确依赖并生成目标锁
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          "$core" 包 更新 .
          "$core" 包 更新 examples
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cache_win=$(cygpath -w "$HOME/.yanxu/缓存")
            printf 'YANXU_CACHE=\\\\?\\%s\n' "$cache_win" >> "$GITHUB_ENV"
          fi
      - name: 静态检查全部源码测试与示例
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          find src tests integration examples -type f -name '*.yx' -print0 | \
            while IFS= read -r -d '' file; do
              "$core" 格 "$file" > "$RUNNER_TEMP/formatted.yx"
              cmp "$file" "$RUNNER_TEMP/formatted.yx"
              "$core" 查 "$file"
            done
      - name: 单元测试与无窗口集成
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          # 言台 1.0 六目标包冷加载计入单卷耗时；保持 30 秒硬上限以区分慢启动与挂起。
          "$core" 试 tests --超时 30000
          "$core" 字节 integration/控件树集成.yx
          "$core" 字节 integration/表单控件.yx
          "$core" 字节 integration/渲染命令.yx
          "$core" 字节 integration/高级控件.yx
          "$core" 字节 integration/数据视图.yx
          "$core" 字节 integration/文本视图.yx
      - name: 构建正式包入口与全部公开示例
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          mkdir -p "$RUNNER_TEMP/build"
          "$core" 编 . --release -o "$RUNNER_TEMP/build/yanxu-ui.yxb"
          find examples -maxdepth 1 -type f -name '*.yx' -print0 | sort -z | \
            while IFS= read -r -d '' file; do
              name=$(basename "$file" .yx)
              "$core" 编 "$file" --release -o "$RUNNER_TEMP/build/$name.yxb"
          done
          test "$(find "$RUNNER_TEMP/build" -type f -name '*.yxb' | wc -l | tr -d ' ')" -eq 15
      - name: 隔离构建并回放可发布应用
        shell: bash
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-release/target/debug/yanxu$suffix"
          isolated="$RUNNER_TEMP/current-ui"
          archive="$RUNNER_TEMP/current-ui.tar"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            isolated=$(cygpath -u "$isolated")
            archive=$(cygpath -u "$archive")
          fi
          mkdir -p "$isolated"
          git archive --format=tar HEAD -o "$archive"
          tar -xf "$archive" -C "$isolated"
          "$core" 包 更新 "$isolated"
          "$core" 包 更新 "$isolated/examples"
          "$core" 编 "$isolated/examples/自动关闭冒烟.yx" --release \
            -o "$RUNNER_TEMP/build/自动关闭冒烟.yxb"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a "$core" 行 "$RUNNER_TEMP/build/自动关闭冒烟.yxb"
          else
            "$core" 行 "$RUNNER_TEMP/build/自动关闭冒烟.yxb"
          fi
          printf 'runtime=1.1.20\ntarget=%s\n' "$EXPECTED_TARGET" \
            > "$RUNNER_TEMP/build/自动关闭冒烟.yxb.runtime"
      - name: 真实原生窗口与整帧提交冒烟
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a "$core" 字节 integration/真实窗口.yx
            xvfb-run -a "$core" 字节 integration/叠层窗口.yx
            xvfb-run -a "$core" 字节 integration/菜单窗口.yx
            xvfb-run -a "$core" 字节 integration/动画窗口.yx
          else
            "$core" 字节 integration/真实窗口.yx
            "$core" 字节 integration/叠层窗口.yx
            "$core" 字节 integration/菜单窗口.yx
            "$core" 字节 integration/动画窗口.yx
          fi
      - name: API 漂移、文档与平台边界门禁
        shell: bash
        run: |
          set -euo pipefail
          suffix=""; if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          export YANXU_BIN="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu$suffix"
          sh scripts/verify-api.sh
          sh scripts/check-boundary.sh
          node scripts/check-doc-links.mjs
      - name: 保存目标锁与构建候选
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          candidate="$RUNNER_TEMP/candidate"
          mkdir -p "$candidate/root" "$candidate/examples" "$candidate/build"
          cp 言序.lock "$candidate/root/言序.lock"
          cp examples/言序.lock "$candidate/examples/言序.lock"
          cp "$RUNNER_TEMP/build/自动关闭冒烟.yxb" "$candidate/build/"
          cp "$RUNNER_TEMP/build/自动关闭冒烟.yxb.runtime" "$candidate/build/"
          for file in "$RUNNER_TEMP"/build/*.yxb; do
            if command -v sha256sum >/dev/null 2>&1; then
              checksum=$(sha256sum "$file" | awk '{print $1}')
            else
              checksum=$(shasum -a 256 "$file" | awk '{print $1}')
            fi
            printf '%s  %s\n' "$checksum" "$(basename "$file")"
          done > "$candidate/build/SHA256SUMS"
          test "$(wc -l < "$candidate/build/SHA256SUMS" | tr -d ' ')" -eq 15
          grep -F "target = \"$TARGET\"" "$candidate/root/言序.lock"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yanxu-ui-${{ matrix.target }}
          path: ${{ runner.temp }}/candidate
          if-no-files-found: error

  current-toolchain:
    name: 当前言序兼容
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 安装 Linux 窗口运行依赖
        run: |
          set -euo pipefail
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y \
            libfontconfig1 libwayland-client0 libxkbcommon0 libxkbcommon-x11-0 \
            libx11-6 xvfb
      - name: 检出当前言序工具链
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu
          path: target/yanxu-current
          ref: v1.1.20
      - name: 构建当前言序工具链
        run: cargo build --manifest-path target/yanxu-current/Cargo.toml --locked --bin yanxu
      - name: 验证当前工具链的源码、测试与构建
        shell: bash
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/target/yanxu-current/target/debug/yanxu"
          "$core" 包 更新 .
          "$core" 包 更新 examples
          find src tests integration examples -type f -name '*.yx' -print0 | \
            while IFS= read -r -d '' file; do
              "$core" 查 "$file"
            done
          # 当前工具链在冷缓存中也使用同一有界预算，避免只放宽其中一个兼容端点。
          "$core" 试 tests --超时 30000
          "$core" 字节 integration/控件树集成.yx
          "$core" 字节 integration/表单控件.yx
          "$core" 字节 integration/渲染命令.yx
          "$core" 字节 integration/高级控件.yx
          "$core" 字节 integration/数据视图.yx
          "$core" 字节 integration/文本视图.yx
          xvfb-run -a "$core" 字节 integration/叠层窗口.yx
          xvfb-run -a "$core" 字节 integration/菜单窗口.yx
          xvfb-run -a "$core" 字节 integration/动画窗口.yx
          "$core" 编 . --release -o "$RUNNER_TEMP/yanxu-ui.yxb"
          test -s "$RUNNER_TEMP/yanxu-ui.yxb"

  performance:
    name: Linux x86-64 Release 性能预算
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 检出言序 1.1.20 发布工具链
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu
          path: target/yanxu-performance
          ref: v1.1.20
      - name: 构建 Release 工具链
        run: cargo build --manifest-path target/yanxu-performance/Cargo.toml --release --locked --bin yanxu
      - name: 运行言界性能预算
        shell: bash
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/target/yanxu-performance/target/release/yanxu"
          "$core" 包 更新 .
          "$core" 格 benchmarks/性能预算.yx > "$RUNNER_TEMP/formatted.yx"
          cmp benchmarks/性能预算.yx "$RUNNER_TEMP/formatted.yx"
          "$core" 查 benchmarks/性能预算.yx
          mkdir -p "$RUNNER_TEMP/performance"
          YANXU_MAX_STEPS=1000000000 "$core" 字节 benchmarks/性能预算.yx \
            > "$RUNNER_TEMP/performance/yanxu-ui-performance-budget.json"
          REPORT="$RUNNER_TEMP/performance/yanxu-ui-performance-budget.json" node -e '
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync(process.env.REPORT, "utf8"));
            if (report["模式"] !== "release" || report["预算版本"] !== 1 ||
                report["通过"] !== true || report["场景"].length !== 4 ||
                report["场景"].some((item) => item["通过"] !== true)) process.exit(1);
          '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-budget
          path: ${{ runner.temp }}/performance/yanxu-ui-performance-budget.json
          if-no-files-found: error
          retention-days: 14

  policy:
    name: 包边界、安全与许可
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 检查边界、文档和发布元数据
        run: |
          set -euo pipefail
          sh -n scripts/*.sh
          sh scripts/check-boundary.sh
          node scripts/check-doc-links.mjs
          test -f LICENSE-MIT && test -f LICENSE-APACHE
          test -f SECURITY.md && test -f THIRD_PARTY.md && test -f COMPATIBILITY.md
          for heading in 新功能 修复内容 兼容性与平台 安装示例 升级方式 制品与校验 第三方依赖 已知限制; do
            grep -F "## $heading" docs/RELEASE_NOTES_0.5.0.md >/dev/null
          done
          test -f docs/ACCESSIBILITY.md
          test "$(grep -c '^言台 = .*修订 = "v1.0.0"' 言序.toml)" -eq 1
          grep -E '^言据 = .*修订 = "[0-9a-f]{40}"' 言序.toml >/dev/null
          blocked="$(printf 'co%s' 'dex')"
          if grep -RIni --exclude-dir=.git --exclude-dir=.yanxu --exclude='言序.lock' "$blocked" .; then exit 1; fi

  assemble:
    name: 汇总六目标正式包候选
    needs: [validate, current-toolchain, performance, policy]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yanxu-ui-*
          path: ${{ runner.temp }}/candidates
      - name: 核对六目标锁并创建确定性归档
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
            x86_64-apple-darwin aarch64-apple-darwin
            x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          )
          stage="$RUNNER_TEMP/yanxu-ui-0.5.0"
          mkdir -p "$stage/locks"
          cp -R .github src api benchmarks docs examples integration tests scripts "$stage/"
          cp 言序.toml 言序.lock README.md CHANGELOG.md COMPATIBILITY.md \
            SECURITY.md THIRD_PARTY.md LICENSE-MIT LICENSE-APACHE \
            .gitattributes .gitignore "$stage/"
          for target in "${targets[@]}"; do
            candidate="$RUNNER_TEMP/candidates/yanxu-ui-$target"
            test -f "$candidate/root/言序.lock"
            test -f "$candidate/examples/言序.lock"
            test -f "$candidate/build/自动关闭冒烟.yxb"
            test -f "$candidate/build/自动关闭冒烟.yxb.runtime"
            test "$(wc -l < "$candidate/build/SHA256SUMS" | tr -d ' ')" -eq 15
            grep -F "target = \"$target\"" "$candidate/root/言序.lock"
            grep -Fx 'runtime=1.1.20' "$candidate/build/自动关闭冒烟.yxb.runtime"
            grep -Fx "target=$target" "$candidate/build/自动关闭冒烟.yxb.runtime"
            mkdir -p "$stage/locks/$target/examples"
            mkdir -p "$stage/build/targets/$target"
            cp "$candidate/root/言序.lock" "$stage/locks/$target/言序.lock"
            cp "$candidate/examples/言序.lock" "$stage/locks/$target/examples/言序.lock"
            cp "$candidate/build/自动关闭冒烟.yxb" "$stage/build/targets/$target/"
            cp "$candidate/build/自动关闭冒烟.yxb.runtime" "$stage/build/targets/$target/"
            checksum=$(sha256sum < "$stage/build/targets/$target/自动关闭冒烟.yxb" | awk '{print $1}')
            printf '%s  %s\n' "$checksum" '自动关闭冒烟.yxb' \
              > "$stage/build/targets/$target/自动关闭冒烟.yxb.sha256"
          done
          archive="$GITHUB_WORKSPACE/yanxu-ui-0.5.0-six-targets.tar.gz"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C "$RUNNER_TEMP" -czf "$archive" yanxu-ui-0.5.0
          checksum=$(sha256sum "$archive" | awk '{print $1}')
          printf '%s  %s\n' "$checksum" "$(basename "$archive")" \
            > yanxu-ui-0.5.0-six-targets.sha256
          cp 言序.toml yanxu-ui-0.5.0.toml
          cp api/api-v1.json api-v1.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yanxu-ui-six-targets
          path: |
            yanxu-ui-0.5.0-six-targets.tar.gz
            yanxu-ui-0.5.0-six-targets.sha256
            yanxu-ui-0.5.0.toml
            api-v1.json
          if-no-files-found: error
